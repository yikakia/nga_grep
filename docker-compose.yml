services:
  sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: nga_grep:latest
    restart: unless-stopped
    command:
      - sync
      - --db=/data/nga.db
      - --loop-max=4m50s
      - --loop-min=30s
      - --th-lf=1.3
    volumes:
      - type: bind
        source: ${NGA_DATA_DIR?Please set NGA_DATA_DIR to a host directory that contains nga.db}
        target: /data

  api:
    image: nga_grep:latest
    restart: unless-stopped
    command:
      - api-server
      - --db=/data/nga.db
      - --cors=localhost,dashidai.yikakia.com,nga-grep-front.pages.dev
      - --port=:11648
    ports:
      - "11648:11648"
    volumes:
      - type: bind
        source: ${NGA_DATA_DIR?Please set NGA_DATA_DIR to a host directory that contains nga.db}
        target: /data
